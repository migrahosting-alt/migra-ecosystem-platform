## Deprecated recovery copy. Public 80/443 now land on nginx-proxy-core and redirect mail hostnames to https://migramail.com/.
server {
    listen 80;
    listen [::]:80;
    server_name mail.migrahosting.com mail.migrateck.com;
    return 301 https://migramail.com$request_uri;
}

server {
    listen 443 ssl;
    include /etc/nginx/snippets/ocsp-off.conf;
    listen [::]:443 ssl;
    server_name mail.migrahosting.com mail.migrateck.com;

    ssl_certificate     /etc/letsencrypt/live/mail.migrahosting.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.migrahosting.com/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://migramail.com$request_uri;
}
