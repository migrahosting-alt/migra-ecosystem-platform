# HTTP - Allow ACME challenges, then redirect to HTTPS
server {
    listen 80 ;
    listen [::]:80 ;
    server_name holisticgroupllc.com www.holisticgroupllc.com;
    include /etc/nginx/snippets/tenant-suspension.conf;
    client_max_body_size 256M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2 ;
    include /etc/nginx/snippets/ocsp-off.conf;
    listen [::]:443 ssl http2 ;
    server_name holisticgroupllc.com www.holisticgroupllc.com;
    include /etc/nginx/snippets/tenant-suspension.conf;
    client_max_body_size 256M;

    root /srv/web/clients/holisticgroupllc.com/public;
    index index.php index.html index.htm;

    ssl_certificate /etc/letsencrypt/live/holisticgroupllc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/holisticgroupllc.com/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/holisticgroupllc.com.access.log;
    error_log  /var/log/nginx/holisticgroupllc.com.error.log;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}

