# HTTP - Allow ACME challenges, then redirect to HTTPS
server {
    listen 80 ;
    listen [::]:80 ;
    server_name holisticgroupllc.com www.holisticgroupllc.com;
    include /etc/nginx/snippets/tenant-suspension.conf;
    client_max_body_size 256M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2 ;
    include /etc/nginx/snippets/ocsp-off.conf;
    listen [::]:443 ssl http2 ;
    server_name holisticgroupllc.com www.holisticgroupllc.com;
    include /etc/nginx/snippets/tenant-suspension.conf;
    client_max_body_size 256M;

    ssl_certificate /etc/letsencrypt/live/holisticgroupllc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/holisticgroupllc.com/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/holisticgroupllc.com.access.log;
    error_log  /var/log/nginx/holisticgroupllc.com.error.log;

    location / {
        proxy_pass http://10.1.10.52:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://10.1.10.52:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

