# /etc/nginx/sites-available/call.migrahosting.com.conf
# MigraSoftphone - Web Softphone SPA + WSS Proxy
#
# This serves the web-based softphone application at call.migrahosting.com

server {
    if ($host = call.migrahosting.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name call.migrahosting.com;
    include /etc/nginx/snippets/tenant-suspension.conf;
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    include /etc/nginx/snippets/ocsp-off.conf;
    listen [::]:443 ssl http2;
    server_name call.migrahosting.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/call.migrahosting.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/call.migrahosting.com/privkey.pem; # managed by Certbot
    ssl_trusted_certificate /etc/letsencrypt/live/call.migrahosting.com/chain.pem;

    # SSL settings

    # Security headers
    add_header Content-Security-Policy "frame-ancestors 'self' https://migravoice.com https://www.migravoice.com" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Root for web softphone SPA
    root /var/www/call.migrahosting.com;
    index index.html;

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /build.json {
        default_type application/json;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /apple-touch-icon.png {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # WebSocket proxy to Asterisk PBX (SIP over WSS)
    location /ws {
        proxy_pass http://100.111.4.85:8088/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
        proxy_socket_keepalive on;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:3003/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /client/ {
        proxy_pass http://127.0.0.1:3003/client/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/call.migrahosting.com.access.log;
    error_log /var/log/nginx/call.migrahosting.com.error.log;
}
