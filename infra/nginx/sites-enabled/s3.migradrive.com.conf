server {
    listen 80;
    listen [::]:80;
    server_name s3.migradrive.com;
    include /etc/nginx/snippets/tenant-suspension.conf;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    include /etc/nginx/snippets/ocsp-off.conf;
    listen [::]:443 ssl;
    server_name s3.migradrive.com;
    include /etc/nginx/snippets/tenant-suspension.conf;

    ssl_certificate     /etc/letsencrypt/live/s3.migradrive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s3.migradrive.com/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Important for S3 / MinIO
    client_max_body_size 0;

    location / {
        include /etc/nginx/snippets/migradrive-api-proxy.conf;
    }
}
