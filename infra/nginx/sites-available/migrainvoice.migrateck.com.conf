server {
    server_name migrainvoice.migrateck.com;
    client_max_body_size 256M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:4121/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:4121;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(auth|customers|invoices|payments|receipts|credit-notes|refunds|reports|settings|users|products|categories|catalog|stripe|paypal|square|health|quotes|proformas|recurring-plans|reconciliation|collections|roles|audit|audit-events|payment-links|portal|onboarding|service-plans|subscriptions|notifications|messages|documents|document-packets|submissions|outcomes|lifecycle|forms|workspaces|ai|analytics|signup|billing)(/|$) {
        proxy_pass http://127.0.0.1:4121;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3115;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    include /etc/nginx/snippets/ocsp-off.conf;
    ssl_certificate /etc/letsencrypt/live/migrainvoice.migrateck.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/migrainvoice.migrateck.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = migrainvoice.migrateck.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name migrainvoice.migrateck.com;
    return 404; # managed by Certbot
}