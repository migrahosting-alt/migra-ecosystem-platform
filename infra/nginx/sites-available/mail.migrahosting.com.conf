## Deprecated recovery copy. Primary source of truth is infra/nginx/sites-available/migramail.conf.
# mail.migrahosting.com - MigraMail Webmail React App
server {
    listen 80;
    listen [::]:80;
    server_name mail.migrahosting.com;
    return 301 https://mail.migrahosting.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.migrahosting.com;

    ssl_certificate     /etc/letsencrypt/live/mail.migrahosting.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.migrahosting.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/mail.migrahosting.com;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ~ ^/workbox-.*\.js$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /build.json {
        default_type application/json;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the local MigraMail backend on port 3010
    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Keep SnappyMail accessible at /snappymail for admin
    location /snappymail {
        proxy_pass https://100.81.76.39/snappymail;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_verify off;
    }
}
