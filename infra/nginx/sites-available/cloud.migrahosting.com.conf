# HTTP -> HTTPS, but keep ACME on local webroot for certificate renewal.
server {
    listen 80;
    listen [::]:80;
    server_name cloud.migrahosting.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (S3 API)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cloud.migrahosting.com;

    ssl_certificate     /etc/letsencrypt/live/cloud.migrahosting.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.migrahosting.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 0;

    location / {
        proxy_pass http://100.120.118.39:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}
