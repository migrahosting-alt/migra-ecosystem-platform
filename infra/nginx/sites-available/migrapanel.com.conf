server {
  listen 80;
  server_name migrapanel.com www.migrapanel.com;
  include /etc/nginx/snippets/tenant-suspension.conf;
  return 308 https://migrapanel.com$request_uri;
}

server {
  listen 443 ssl http2;
  include /etc/nginx/snippets/ocsp-off.conf;
  server_name migrapanel.com www.migrapanel.com;
  include /etc/nginx/snippets/tenant-suspension.conf;

  ssl_certificate     /etc/letsencrypt/live/migrapanel.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/migrapanel.com/privkey.pem;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  root /srv/web/mpanel-frontend;
  client_max_body_size 50M;

  # ── Customer Portal ──
  location = /portal {
    try_files /portal.html =404;
  }

  # ── API proxy to panel-api ──
  location /api/ {
    proxy_http_version 1.1;
    proxy_pass http://100.119.105.93:3020;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    proxy_connect_timeout 30;
    proxy_send_timeout 300;
  }

  # ── MigraPanel frontend ──
  location / {
    try_files $uri $uri/ /index.html;
  }
}
