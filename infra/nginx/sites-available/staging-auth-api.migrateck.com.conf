server {
    listen 80;
    listen [::]:80;
    server_name staging-auth-api.migrateck.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging-auth-api.migrateck.com;

    include /etc/nginx/snippets/ocsp-off.conf;
    ssl_certificate /etc/letsencrypt/live/staging-auth-api.migrateck.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-auth-api.migrateck.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"ok":true,"service":"staging-auth-edge"}';
    }

    location / {
        # Default upstream target for staging auth API runtime.
        # Update host/port if your staging API process differs.
        proxy_pass http://10.10.0.10:4120;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 15;
    }
}