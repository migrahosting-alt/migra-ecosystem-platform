server {
    server_name annoupale.com www.annoupale.com;
    root /var/www/annoupale.com;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /index.html;

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    include /etc/nginx/snippets/ocsp-off.conf;
    ssl_certificate /etc/letsencrypt/live/annoupale.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/annoupale.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.annoupale.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = annoupale.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name annoupale.com www.annoupale.com;
    return 404; # managed by Certbot
}