# MigraMail public routing
server {
  listen 80;
  listen [::]:80;
  server_name mail.migrahosting.com mail.migrateck.com;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/mail.migrahosting.com;
    default_type "text/plain";
    allow all;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name migramail.com www.migramail.com;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/migramail.com/public;
    default_type "text/plain";
    allow all;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name mail.migrahosting.com mail.migrateck.com;

  ssl_certificate /etc/letsencrypt/live/mail.migrahosting.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mail.migrahosting.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer" always;

  access_log /var/log/nginx/mail.migrahosting.com.access.log;
  error_log /var/log/nginx/mail.migrahosting.com.error.log warn;

  root /var/www/mail.migrahosting.com;
  index index.html;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/mail.migrahosting.com;
    default_type "text/plain";
    allow all;
  }

  location = /snappymail {
    return 302 https://migramail.com/;
  }

  location ^~ /snappymail/ {
    return 302 https://migramail.com/;
  }

  location = /api/webmail {
    return 308 /api/webmail/;
  }

  location /api/webmail/ {
    proxy_pass http://127.0.0.1:3010/api/webmail/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /sw.js {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location ~ ^/workbox-.*\.js$ {
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  location = /site.webmanifest {
    default_type application/manifest+json;
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  location = /build.json {
    default_type application/json;
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  client_max_body_size 50m;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name migramail.com www.migramail.com;

  ssl_certificate /etc/letsencrypt/live/migramail.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/migramail.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer" always;

  access_log /var/log/nginx/migramail.com.access.log;
  error_log /var/log/nginx/migramail.com.error.log warn;

  root /var/www/migramail.com/public;
  index index.php;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/migramail.com/public;
    default_type "text/plain";
    allow all;
  }

  location ^~ /data { deny all; }

  location = /favicon.svg { add_header Cache-Control "no-store, max-age=0" always; }
  location = /favicon.ico { add_header Cache-Control "no-store, max-age=0" always; }
  location = /apple-touch-icon.png { add_header Cache-Control "no-store, max-age=0" always; }
  location = /snappymail/v/2.38.2/static/favicon.svg { add_header Cache-Control "no-store, max-age=0" always; }
  location = /snappymail/v/2.38.2/static/apple-touch-icon.png { add_header Cache-Control "no-store, max-age=0" always; }
  location = /snappymail/v/2.38.2/static/favicon.ico { add_header Cache-Control "no-store, max-age=0" always; }

  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }

  location ~ \.php$ {
    include snippets/fastcgi-php.conf;
    fastcgi_hide_header X-Frame-Options;
    fastcgi_hide_header X-Content-Type-Options;
    fastcgi_hide_header X-XSS-Protection;
    fastcgi_hide_header Referrer-Policy;
    fastcgi_pass unix:/run/php/php-fpm.sock;
  }

  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  client_max_body_size 50m;
}