# /etc/nginx/sites-available/migrapilot.migrateck.com.conf
# MigraPilot AI Copilot API — reverse-proxy on srv1-web
# Upstream: pilot-api on migrapanel-core (100.119.105.93:3377)

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name migrapilot.migrateck.com;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to pilot-api
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name migrapilot.migrateck.com;

    # SSL certs — certbot will populate these
    ssl_certificate     /etc/letsencrypt/live/migrapilot.migrateck.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/migrapilot.migrateck.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Reasonable body limits for API + chat payloads
    client_max_body_size 10m;

    # Health endpoint (no auth, fast path)
    location = /health {
        proxy_pass http://100.119.105.93:3377/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location /api/pilot/ {
        proxy_pass http://100.119.105.93:3377/api/pilot/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support for chat endpoint
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket upgrade support (if needed later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Catch-all → 404
    location / {
        return 404 '{"error":"Not found. Use /api/pilot/ endpoints."}';
        default_type application/json;
    }
}
