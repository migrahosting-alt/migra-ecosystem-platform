# Canonical MigraDrive S3/API upstream.
# Keep all storage API hostnames on the same gateway so signed S3 requests
# and alias domains do not drift across different MinIO backends.
proxy_pass         https://10.1.10.240;
proxy_set_header   Host $host;
proxy_set_header   X-Real-IP $remote_addr;
proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
proxy_http_version 1.1;
proxy_set_header   Connection "";

# MinIO-specific forwarding headers.
proxy_set_header   X-Forwarded-Host $host;
proxy_set_header   X-Forwarded-Port $server_port;

proxy_ssl_server_name on;
proxy_ssl_name $host;
proxy_ssl_verify off;

proxy_connect_timeout 10s;
proxy_read_timeout 300s;
