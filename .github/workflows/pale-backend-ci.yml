name: Pale — Backend CI

on:
  push:
    paths:
      - "Software/Pale/backend/**"
      - "Software/Pale/packages/**"
      - "Software/Pale/pnpm-lock.yaml"
      - "Software/Pale/tsconfig.base.json"
  pull_request:
    paths:
      - "Software/Pale/backend/**"
      - "Software/Pale/packages/**"

defaults:
  run:
    working-directory: Software/Pale

jobs:
  ci:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Minimal env to satisfy validation at build time (non-production)
      NODE_ENV: test
      DATABASE_URL: postgresql://pale:pale@localhost:5432/pale_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-not-used
      REFRESH_TOKEN_SECRET: ci-refresh-secret-not-used
      ALLOWED_ORIGINS: http://localhost:3000
      OTP_PROVIDER: dev
      STORAGE_DRIVER: local-dev
      APP_INVITE_BASE_URL: https://pale.app/join

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: Software/Pale/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (backend)
        run: pnpm --filter @pale/backend typecheck

      - name: Typecheck (shared)
        run: pnpm --filter @pale/shared typecheck

      - name: Lint (backend)
        run: pnpm --filter @pale/backend lint

      - name: Build (backend)
        run: pnpm --filter @pale/backend build
