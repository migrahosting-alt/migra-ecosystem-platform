name: Release Check Comment

on:
  workflow_run:
    workflows:
      - Release Check
    types:
      - completed

jobs:
  comment-on-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read

    steps:
      - name: Find pull request
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              core.setOutput('number', '');
              return;
            }
            core.setOutput('number', String(prs[0].number));

      - name: Comment on PR
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const body = [
              '## Release Check Failed',
              '',
              'The release packet does not currently satisfy enforcement rules.',
              '',
              'Typical causes:',
              '- missing required artifact',
              '- placeholders still present',
              '- performance audit not locked to production',
              '- soak not complete',
              '- invalid GO/NO-GO decision state',
              '- missing rationale or sign-off',
              '',
              'Check the Release Check workflow logs and uploaded release-check-output artifact for the exact failures.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });