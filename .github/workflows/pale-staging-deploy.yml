name: Pale — Staging Deploy

on:
  push:
    branches:
      - main
    paths:
      - "Software/Pale/backend/**"
      - "Software/Pale/packages/**"
      - "Software/Pale/infra/**"

defaults:
  run:
    working-directory: Software/Pale

jobs:
  deploy-backend:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging

    env:
      FLY_API_TOKEN: ${{ secrets.PALE_FLY_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: Software/Pale/pnpm-lock.yaml

      - name: Install fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter @pale/backend build

      - name: Run DB migrations
        working-directory: Software/Pale/backend
        env:
          DATABASE_URL: ${{ secrets.PALE_STAGING_DATABASE_URL }}
        run: pnpm prisma migrate deploy

      - name: Deploy to Fly.io
        working-directory: Software/Pale/backend
        run: flyctl deploy --remote-only --app pale-backend-staging
