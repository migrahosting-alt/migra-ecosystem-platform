name: Workspace Hygiene Gate

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace-hygiene:
    name: Workspace Hygiene (Strict)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run strict workspace hygiene audit
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/audit-workspace-root.sh --strict