          POLICY_EXCEPTIONS_PATH="$TMP_EXCEPTIONS_FILE" npm run ops:policy:verify-exceptions

      - name: Start API
        working-directory: services/pilot-api
        shell: bash
        run: |
          set -euo pipefail
          nohup node dist/server.js > .pilot-api-ci-full.log 2>&1 &
