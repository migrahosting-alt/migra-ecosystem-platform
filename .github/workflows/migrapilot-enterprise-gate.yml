      - name: Run full strict benchmark gate
        working-directory: services/pilot-api
        run: npm run benchmark:chat:full:strict

      - name: Run full regression compare
        working-directory: services/pilot-api
        run: npm run benchmark:chat:compare:full

      - name: Run runtime path eval
        working-directory: services/pilot-api
        run: npm run eval:path-answers

