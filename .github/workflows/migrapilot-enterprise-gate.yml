      PILOT_API_PORT: 3377
      PILOT_MOCK_PODS_CREATE_SUCCESS: "true"
      PILOT_CHAT_STYLE: copilot
      DEFAULT_PROVIDER: haiku
      ESCALATION_PROVIDER: sonnet
      BENCH_PROFILE: full
      BENCH_FAIL_ON_GATES: "true"
      REG_ALLOW_BOOTSTRAP: "true"
      SLO_FULL_MIN_RELIABILITY: "1"
      SLO_FULL_MAX_P95_MS: "45000"
      SLO_FULL_MAX_ARTIFACT_LEAK_RATE: "0"
      SLO_FULL_MAX_EMPTY_REPLY_RATE: "0.25"
      SLO_FULL_MAX_MISSING_PATH_ANSWER_RATE: "0"
      SLO_FULL_MIN_OVERALL: "0.8"
      SPEED_FULL_P95_BUDGET_MS: "45000"
      REG_MAX_P95_INCREASE_MS: "2500"
      REG_MAX_OVERALL_DROP: "0.05"
      REG_MAX_RELIABILITY_DROP: "0"
      BURN_MIN_RELIABILITY: "1"
      BURN_MIN_OVERALL: "0.8"
      BURN_SHORT_LIMIT: "8"
      BURN_LONG_LIMIT: "2"
      SUPPLY_MAX_HIGH: "0"
      SUPPLY_MAX_CRITICAL: "0"
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/pilot-api/package-lock.json

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLAUDE_API_KEY:-}" ]]; then
            echo "❌ Missing required secret: CLAUDE_API_KEY"
            echo "Add repository secret CLAUDE_API_KEY to enable enterprise benchmark gates."
            exit 1
          fi

      - name: Install dependencies
        working-directory: services/pilot-api
        run: npm ci

      - name: Security audit (dependencies)
        working-directory: services/pilot-api
        run: npm audit --audit-level=high || true

      - name: Generate Prisma client
        working-directory: services/pilot-api
        run: npm run prisma:generate

      - name: Type-check (strict)
        working-directory: services/pilot-api
        run: npx tsc --noEmit

      - name: Build API
        working-directory: services/pilot-api
        run: npm run build

      - name: Policy signer/verifier compatibility smoke
        working-directory: services/pilot-api
        shell: bash
        run: |
          set -euo pipefail
          TMP_EXCEPTIONS_FILE="$(mktemp)"
          trap 'rm -f "$TMP_EXCEPTIONS_FILE"' EXIT
          printf '{"version":1,"exceptions":[]}\n' > "$TMP_EXCEPTIONS_FILE"

          npm run ops:policy:sign-exception -- \
