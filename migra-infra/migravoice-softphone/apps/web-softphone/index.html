<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/migra-logo-48.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MigraVoice - Enterprise Softphone</title>

    <!-- MigraVoice Brand Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/site.webmanifest">

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="MigraVoice Enterprise Softphone - HD Voice, AI Transcription, Call Transfer, Conference, Team Management">

    <!-- Apple PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MigraVoice">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- Microsoft PWA Meta Tags -->
    <meta name="msapplication-TileColor" content="#2563eb">

    <!-- Open Graph for sharing -->
    <meta property="og:title" content="MigraVoice Enterprise Softphone">
    <meta property="og:description" content="Enterprise VoIP softphone with WebRTC, AI transcription and team management">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/migra-logo-192.png">
  </head>
  <body class="font-sans" style="background-color: #0A0118; color: white;">
    <div id="root">
      <!-- Loading fallback until React hydrates -->
      <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div style="width: 60px; height: 60px; border: 4px solid rgba(138,77,255,0.3); border-top-color: #8A4DFF; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 16px; color: #888;">Loading MigraVoice...</p>
      </div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
    <noscript>
      <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0A0118; color: white;">
        <p>JavaScript is required to run MigraVoice.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
